<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>My Book Colletion</h1>
    </header>
    <div class="main-grid">
    <div class="form-container">
        <form  id="book-form">
            <p>

            <label class="label-block" for="title">Title</label>
            <input type="text" id="title" required>   
        </p>
        <p>
            <label class="label-block" for="author">Author</label>
            <input type="text" id="author" required>
        </p>
        <p>
            <label class="label-block" for="pages">Pages</label>
            <input type="number" min="0" id="pages" required>
        </p>
        
        <div class="button-container">
            <p>
                <label for="read">It's read</label>
                <input type="checkbox" id="read">
            </p>
            <button type="submit">Add book</button>
        </div>
        </form>
    </div>
    <main>
        <div class="card-container">

        </div>
    </main>
</div>
    <script src="/index.js" defer></script>
</body>
</html>
